<!DOCTYPE html>
<html lang="en"  class="bg-[#F8FAFC]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>
<!-- tailwind and dasiUI CDN -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<!-- google font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font awesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
*{
    font-family: "Geist", sans-serif;
}
</style>

</head>
<body>
  
  <!-- DashBoard Area -->

  <section class="w-[90%] mx-auto max-w-6xl  border-b-2  border-gray-300 pt-16 pb-[30px]">
    <!-- dashboard heading -->
     <h2 class="font-bold text-[32px] text-[#002C5C]">Job Application Tracker</h2>

     <!-- main dashboard -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-5">

  <!-- total -->
<div class="p-5 bg-white rounded-lg border border-gray-100">
  <h6 class="font-medium text-[#323B49]">Total</h6>
  <p id="total-application" class="text-[#002C5C] text-2xl font-bold">0</p>
</div>

<!-- interview -->
 <div class="p-5 bg-white rounded-lg border border-gray-100">
  <h6 class="font-medium text-[#323B49]">Interview</h6>
  <p id="dashboard-interview--count" class="text-[#10B981] text-2xl font-bold">0</p>
 </div>
 <!-- rejected -->
  <div class="p-5 bg-white rounded-lg border border-gray-100">
      <h6 class="font-medium text-[#323B49]">Rejected</h6>
  <p id="dashboard-rejected-count" class="text-[#EF4444] text-2xl font-bold">0</p>
  </div>
</div>

  </section>


<!-- filter button area  -->

<section class="w-[90%] mx-auto max-w-6xl mt-[30px]  space-y-6">
  <!-- avialbe area -->
<div class="flex justify-between items-center"><p class="text-xl font-semibold text-[#002C5C]">Available Jobs</p><p class="text-[#64748B] font-medium"><span>0</span> jobs</p></div>

<!-- filter button area -->

<div class="space-x-2">

<button id="" class="filte-btn btn px-8 py-5 bg-[#3B82F6] text-white">All</button>
<button id="" class="filte-btn btn">Interview</button>
<button id="" class="filte-btn btn">Rejected</button>

</div>

</section>

</body>
</html>
